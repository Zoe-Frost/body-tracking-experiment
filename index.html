<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AR Body Texture</title>

  <!-- Make it responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Basic styling -->
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>

<body>

  <!-- Webcam (hidden) -->
  <video id="video" autoplay playsinline style="display:none;"></video>

  <!-- Canvas output -->
  <canvas id="canvas"></canvas>

  <!-- Your texture image (CHANGE THIS FILE) -->
  <img id="texture" src="assets/lots-of-dots.svg" style="display:none;" />

  <!-- MediaPipe Selfie Segmentation -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>

  <!-- Your JS file -->
  <script src="script.js"></script>

</body>
</html>
